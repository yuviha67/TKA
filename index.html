<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* CSS murni agar tampilan tetap bagus meski tanpa internet */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #eff6ff; 
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 32px;
        }
        
        /* Bagian Header & Logo Baru */
        .header { text-align: center; margin-bottom: 32px; }
        .icon-wrapper {
            width: 80px; 
            height: 80px;
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0 auto 12px;
            overflow: hidden; /* Menjaga agar logo tetap bulat */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .icon-wrapper img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Memastikan logo pas di dalam lingkaran */
        }
        .header h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; line-height: 1.2; }
        .header p { font-size: 14px; color: #6b7280; }
        
        /* Bagian Form Input */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; text-align: center; }
        input[type="number"] {
            width: 100%; padding: 14px 16px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            text-align: center;
            font-size: 18px; font-weight: 600; letter-spacing: 2px;
            outline: none; transition: all 0.2s;
        }
        input[type="number"]:focus {
            border-color: #3b82f6; background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .btn-primary {
            width: 100%; padding: 14px;
            background-color: #2563eb; color: #ffffff;
            border: none; border-radius: 16px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background-color 0.2s; margin-top: 8px;
        }
        .btn-primary:hover { background-color: #1d4ed8; }
        
        .btn-secondary {
            width: 100%; padding: 12px;
            background-color: #f3f4f6; color: #374151;
            border: none; border-radius: 16px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background-color 0.2s; margin-top: 24px;
        }
        .btn-secondary:hover { background-color: #e5e7eb; }
        
        #pesan-error {
            display: none;
            background-color: #fef2f2; color: #ef4444;
            padding: 10px; border-radius: 8px; font-size: 14px;
            text-align: center; font-weight: 500; margin-bottom: 16px;
        }
        
        /* Bagian Hasil */
        #section-hasil { display: none; }
        .result-header { text-align: center; border-bottom: 1px solid #f3f4f6; padding-bottom: 16px; margin-bottom: 20px; }
        .badge-success {
            display: inline-block; background-color: #dcfce3; color: #15803d;
            font-size: 12px; font-weight: 600; padding: 4px 12px;
            border-radius: 99px; margin-bottom: 8px;
        }
        .student-name { font-size: 18px; font-weight: 700; color: #111827; text-transform: uppercase; margin-bottom: 4px; }
        .student-info { font-size: 14px; color: #6b7280; margin-bottom: 2px; }
        
        .subject-card {
            background-color: #eff6ff; border: 1px solid #dbeafe;
            padding: 16px; border-radius: 16px; text-align: center;
            margin-bottom: 12px;
        }
        .subject-title { font-size: 12px; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .subject-score { font-size: 32px; font-weight: 700; color: #111827; line-height: 1; }
        .subject-desc { font-size: 14px; font-weight: 500; color: #4b5563; margin-top: 4px; }
